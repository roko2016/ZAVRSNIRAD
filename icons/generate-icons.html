<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function draw(id, size) {
  const c = document.getElementById(id);
  const ctx = c.getContext('2d');
  const r = size * 0.12;

  // Background
  const grad = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  grad.addColorStop(0, '#1a1f6e');
  grad.addColorStop(1, '#0D1245');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, r);
  ctx.fill();

  // Text
  ctx.fillStyle = '#C229FF';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `bold ${size * 0.22}px sans-serif`;
  ctx.fillText('O&A', size/2, size/2);

  const link = document.createElement('a');
  link.download = `icon-${size}.png`;
  link.href = c.toDataURL();
  link.textContent = `Download icon-${size}.png`;
  link.style.display = 'block';
  link.style.marginTop = '8px';
  document.body.appendChild(link);
}
draw('c192', 192);
draw('c512', 512);
</script>
</body>
</html>
